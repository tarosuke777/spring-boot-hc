services:
  hc-db-dynamodb:
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    image: "amazon/dynamodb-local:latest"
    ports:
      - "8000:8000"
    restart: always
    user: root
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal
    networks:
      - home_network
  hc-ap:
    image: hc:1.0
    build:
      context: .
      dockerfile: ./docker/web-ap/Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: http://hc-db-dynamodb:8000
      SPRING_DATASOURCE_URL_HMS: jdbc:mariadb://home-db-mariadb:3306/hms
      SPRING_AI_HMS_HOST: http://hms-ap:8080/hms
      SPRING_AI_MODEL_HOST: http://192.168.10.11:11434
    secrets:
      - hms_api_username
      - hms_api_password
    networks:
      - home_network
networks:
  home_network:
    external: true
volumes:
  dynamodb_data:
    name: hc-dynamodb-data
secrets:
  hms_api_username:
    file: C:\\dev\\secrets\\hms_api_username.txt  
  hms_api_password:
    file: C:\\dev\\secrets\\hms_api_password.txt